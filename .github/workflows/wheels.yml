name: Wheels

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wheels:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
            archs: x86_64
            cibw_environment: "PIP_NO_CACHE_DIR=1"
            artifact: wheels-linux-x86_64
          - name: Windows AMD64
            os: windows-latest
            archs: AMD64
            cibw_environment: "PIP_NO_CACHE_DIR=1"
            artifact: wheels-windows-amd64
          - name: macOS x86_64
            os: macos-15-intel
            archs: x86_64
            cibw_environment: "PIP_NO_CACHE_DIR=1 MACOSX_DEPLOYMENT_TARGET=10.15"
            artifact: wheels-macos-x86_64
          - name: macOS arm64
            os: macos-latest
            archs: arm64
            cibw_environment: "PIP_NO_CACHE_DIR=1 MACOSX_DEPLOYMENT_TARGET=11.0"
            artifact: wheels-macos-arm64
    env:
      CIBW_ARCHS: ${{ matrix.archs }}
      CIBW_ENVIRONMENT: ${{ matrix.cibw_environment }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - name: Build and test wheels
        uses: pypa/cibuildwheel@v3.4.1
        with:
          output-dir: wheelhouse
      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: wheelhouse/*.whl

  sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Build sdist
        run: |
          python -m pip install --upgrade pip "maturin>=1.13.3,<2"
          maturin sdist --out dist
      - name: Smoke-test sdist install
        run: |
          python -m venv .venv-sdist
          . .venv-sdist/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.tar.gz
          python ci/smoke_wheel.py
      - name: Upload sdist artifact
        uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz
